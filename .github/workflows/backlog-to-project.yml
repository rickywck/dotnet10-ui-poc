name: Sync Backlog

on:
  push:
    paths:
      - "backlog/**/*.md"

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Run backlog parser
        run: node scripts/sync-backlog.js
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
