name: Sync Backlog

on:
  workflow_dispatch:

  push:
    branches:
      - master
    paths:
      - "backlog/**/*.md"
    paths-ignore:
      - "backlog/fixtures/**"
      - "backlog/**/_fixtures/**"
      - "backlog/**/samples/**"
      - "backlog/**/_samples/**"
      
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # force actions to run on Node 24

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      issues: write
      contents: write

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4   # latest v4 version

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24   # Node.js version for your script

      # 3️⃣ Install npm dependencies
      - name: Install dependencies
        run: npm install
    
      # 4️⃣ Run backlog parser
      - name: Run backlog parser
        run: node scripts/sync-backlog.mjs
        env:
          GH_PAT: ${{ secrets.GH_TOKEN }}  # PAT with repo + project access

      - name: Commit updated MD files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backlog/
          git commit -m "Sync GitHub issue mapping" || echo "No changes to commit"
          git push origin HEAD:master
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
