name: Sync Backlog

on:
  workflow_dispatch:

  push:
    branches:
      - master
    paths:
      - "backlog/**/*.md"
    paths-ignore:
      - "backlog/**/*.md"
      
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # force actions to run on Node 24

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      issues: write
      contents: write

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4   # latest v4 version

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24   # Node.js version for your script

      # 3️⃣ Install npm dependencies
      - name: Install dependencies
        run: npm install
    
      # 4️⃣ Run backlog parser
      - name: Run backlog parser
        run: node scripts/sync-backlog.mjs
        env:
          GH_PAT: ${{ secrets.GH_TOKEN }}  # PAT with repo + project access

      - name: Commit backlog mapping
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
        
          git add backlog/*.md
          git commit -m "Sync GitHub issue mapping" || echo "No changes"
      
          for i in {1..3}; do
            git pull --rebase origin master && git push && break
            sleep 2
          done
